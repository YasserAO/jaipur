<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jaipur</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-board" aria-labelledby="game-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">Browser Game</p>
            <h1 id="game-title">Jaipur</h1>
          </div>
          <button id="new-game" type="button">New Game</button>
        </div>

        <div class="stats" aria-live="polite">
          <div>
            <span class="label">Day</span>
            <strong id="day">1</strong>
          </div>
          <div>
            <span class="label">Rupees</span>
            <strong id="rupees">0</strong>
          </div>
          <div>
            <span class="label">Camels</span>
            <strong id="camels">3</strong>
          </div>
          <div>
            <span class="label">Goal</span>
            <strong>120</strong>
          </div>
        </div>

        <div class="market" id="market" aria-label="Market goods"></div>

        <div class="actions">
          <button id="trade" type="button">Trade Selected</button>
          <button id="rest" type="button">Restock Market</button>
        </div>

        <p id="message" class="message">Select goods that share a color or choose camels to trade.</p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
